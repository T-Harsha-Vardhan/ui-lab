<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Harshavardhan is a Frontend Developer building modern web experiences with HTML, CSS and JavaScript."
    />
    <title>Business Card</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
      integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <article class="business-card">
        <div class="avatar">
          <img
            src="./me-professional.webp"
            alt="Harshavardhan"
            width="110"
            height="110"
          />
        </div>
        <h1>Harshavardhan</h1>
        <p class="role">Frontend Developer</p>
        <p class="bio">
          Building modern web experiences with HTML, CSS and JavaScript.
        </p>
        <nav aria-label="Social links">
          <ul>
            <li>
              <a
                href="https://www.instagram.com/developerthv/"
                target="_blank"
                rel="noopener noreferrer"
                class="social-link"
                aria-label="Instagram"
              >
                <i class="ri-instagram-line"></i>
              </a>
            </li>
            <li>
              <a
                href="https://www.linkedin.com/in/harshavardhan-tholeti/"
                target="_blank"
                rel="noopener noreferrer"
                class="social-link"
                aria-label="LinkedIn"
              >
                <i class="ri-linkedin-fill"></i>
              </a>
            </li>
            <li>
              <a
                href="https://x.com/developerthv"
                target="_blank"
                rel="noopener noreferrer"
                class="social-link"
                aria-label="X"
              >
                <i class="ri-twitter-x-line"></i>
              </a>
            </li>
          </ul>
        </nav>
        <a href="mailto:developerthv@gmail.com" class="cta-btn">
          Get in touch
        </a>
      </article>
    </main>
  </body>
</html>
